<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <!-- OpenBuilder: AI app builder. Concept: building blocks assembling into an app.
       currentColor for structural elements (dark/light adaptive). -->
  
  <!-- 3 stacked building blocks (app layers) — currentColor -->
  <rect x="32" y="30" width="64" height="20" rx="4" stroke="currentColor" stroke-width="3" fill="none" opacity="0.4"/>
  <rect x="28" y="54" width="72" height="20" rx="4" stroke="currentColor" stroke-width="3" fill="none" opacity="0.65"/>
  <rect x="24" y="78" width="80" height="20" rx="4" stroke="currentColor" stroke-width="3" fill="currentColor" fill-opacity="0.08"/>
  
  <!-- Spark/AI element on top block -->
  <path d="M 64 18 L 67 26 L 75 23 L 70 30 L 76 36 L 67 34 L 64 42 L 61 34 L 52 36 L 58 30 L 53 23 L 61 26 Z" fill="#fbbf24" opacity="0.9"/>
  
  <!-- Window dots on bottom block (app UI) -->
  <circle cx="36" cy="88" r="2.5" fill="currentColor" opacity="0.5"/>
  <circle cx="46" cy="88" r="2.5" fill="currentColor" opacity="0.5"/>
  <rect x="56" y="85" width="20" height="6" rx="1.5" fill="currentColor" opacity="0.3"/>
  
  <!-- Connection lines between blocks (assembly) -->
  <line x1="64" y1="50" x2="64" y2="54" stroke="currentColor" stroke-width="2" opacity="0.4"/>
  <line x1="64" y1="74" x2="64" y2="78" stroke="currentColor" stroke-width="2" opacity="0.4"/>
</svg>
