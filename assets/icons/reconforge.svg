<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <!-- Transparent background — adapts to light/dark mode via currentColor.
       Structural elements (rings, sweep, brackets, anvil) use currentColor
       so they're dark on light bg, light on dark bg. Blips use amber
       (#fbbf24) which is visible on both. -->

  <!-- Radar rings (3 concentric circles) — currentColor, increasing opacity inward -->
  <circle cx="64" cy="58" r="40" stroke="currentColor" stroke-width="2.5" stroke-opacity="0.3" fill="none"/>
  <circle cx="64" cy="58" r="28" stroke="currentColor" stroke-width="2.5" stroke-opacity="0.5" fill="none"/>
  <circle cx="64" cy="58" r="16" stroke="currentColor" stroke-width="2.5" stroke-opacity="0.7" fill="none"/>

  <!-- Radar sweep leading edge -->
  <line x1="64" y1="58" x2="92" y2="30" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

  <!-- Target blips — amber (visible on both light + dark) -->
  <circle cx="78" cy="40" r="4" fill="#fbbf24"/>
  <circle cx="86" cy="54" r="4" fill="#fbbf24"/>
  <circle cx="72" cy="74" r="3.5" fill="#f59e0b"/>

  <!-- Center dot (scanner origin) — currentColor -->
  <circle cx="64" cy="58" r="4" fill="currentColor"/>

  <!-- Forge: simplified anvil — currentColor -->
  <rect x="56" y="100" width="16" height="4" rx="1" fill="currentColor" opacity="0.7"/>
  <path d="M 52 96 L 76 96 L 74 100 L 54 100 Z" fill="currentColor" opacity="0.6"/>

  <!-- 2 scope brackets — currentColor -->
  <path d="M 18 26 L 18 18 L 26 18" stroke="currentColor" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round" fill="none"/>
  <path d="M 102 110 L 110 110 L 110 102" stroke="currentColor" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round" fill="none"/>
</svg>
