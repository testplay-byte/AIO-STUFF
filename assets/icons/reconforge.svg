<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <!-- Background: dark rounded square (security aesthetic) -->
  <rect width="128" height="128" rx="28" fill="#0d1117"/>

  <!-- Radar rings (3 concentric circles, clean + bold) -->
  <circle cx="64" cy="58" r="40" stroke="#22c55e" stroke-width="2" stroke-opacity="0.3" fill="none"/>
  <circle cx="64" cy="58" r="28" stroke="#22c55e" stroke-width="2" stroke-opacity="0.5" fill="none"/>
  <circle cx="64" cy="58" r="16" stroke="#22c55e" stroke-width="2" stroke-opacity="0.7" fill="none"/>

  <!-- Radar sweep (simplified — just the leading edge line) -->
  <line x1="64" y1="58" x2="92" y2="30" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

  <!-- 3 target blips (simplified — just dots, no glow) -->
  <circle cx="78" cy="40" r="3.5" fill="#fbbf24"/>
  <circle cx="86" cy="54" r="3.5" fill="#fbbf24"/>
  <circle cx="72" cy="74" r="3" fill="#22c55e"/>

  <!-- Center dot (scanner origin) -->
  <circle cx="64" cy="58" r="3.5" fill="#22c55e"/>

  <!-- Forge: simplified anvil at bottom -->
  <rect x="56" y="100" width="16" height="4" rx="1" fill="#6b7280"/>
  <path d="M 52 96 L 76 96 L 74 100 L 54 100 Z" fill="#9ca3af"/>

  <!-- 2 scope brackets (top-left + bottom-right, simplified) -->
  <path d="M 18 26 L 18 18 L 26 18" stroke="#22c55e" stroke-width="2" stroke-opacity="0.5" stroke-linecap="round" fill="none"/>
  <path d="M 102 110 L 110 110 L 110 102" stroke="#22c55e" stroke-width="2" stroke-opacity="0.5" stroke-linecap="round" fill="none"/>
</svg>
